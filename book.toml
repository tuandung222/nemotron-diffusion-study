[book]
title = "Nemotron-Labs-Diffusion Study"
description = "A self-contained set of lecture notes and code labs covering diffusion language models, mixed AR-diffusion training, and a deep dive into NVIDIA's Nemotron-Labs-Diffusion (NLD) model family — including the VLM variant."
authors = ["tuandung222", "Devin (drafting assistant)"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/tuandung222/nemotron-diffusion-study"
edit-url-template = "https://github.com/tuandung222/nemotron-diffusion-study/edit/main/{path}"
mathjax-support = false
no-section-label = false
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 25
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[preprocessor.katex]
# Inline math: $...$  ;  Display math: $$...$$
# KaTeX is run as a preprocessor, BEFORE the markdown -> HTML stage,
# so underscores inside math expressions are no longer eaten by the
# markdown italic parser. This is the fix for "x_t" being mis-rendered
# as "xt" because markdown consumed the underscores.
macros = "./theme/katex-macros.txt"
# Don't throw build errors on bad input — log + continue. Catches in CI as warnings.
throw-on-error = false
